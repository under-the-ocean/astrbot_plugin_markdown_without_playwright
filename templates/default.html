<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
/* ── KaTeX ── */
{{ katex_css | safe }}

/* ── 代码高亮 ── */
.codehilite { background: #f5f5f5; border-radius: 6px; padding: 12px 16px; overflow-x: auto; margin: 1em 0; }
.codehilite pre { margin: 0; white-space: pre-wrap; }

/* ── 自定义字体 ── */
@font-face {
  font-family: 'CustomFont';
  src: url('{{ font_url }}') format('truetype');
}

/* ── 基础排版 ── */
* { box-sizing: border-box; }
body {
  font-family: 'CustomFont', 'Noto Sans SC', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  font-size: 15px;
  line-height: 1.7;
  color: #2c3e50;
  background: #ffffff;
  margin: 0;
  padding: 28px 32px;
  width: {{ width }}px;
}

/* ── 标题 ── */
h1 { font-size: 1.6em; color: #1a1a2e; margin: 1.2em 0 0.5em; border-bottom: 2px solid #3eaf7c; padding-bottom: 6px; }
h2 { font-size: 1.35em; color: #1a1a2e; margin: 1.1em 0 0.4em; border-bottom: 1px solid #e8e8e8; padding-bottom: 4px; }
h3 { font-size: 1.15em; color: #2c3e50; margin: 1em 0 0.3em; }
h4 { font-size: 1.05em; color: #2c3e50; margin: 0.8em 0 0.3em; }

/* ── 段落与列表 ── */
p { margin: 0.6em 0; }
ul, ol { margin: 0.4em 0; padding-left: 1.8em; }
li { margin: 0.2em 0; }

/* ── 引用 ── */
blockquote {
  margin: 0.8em 0;
  padding: 6px 14px;
  border-left: 4px solid #3eaf7c;
  background: #f8fbf9;
  color: #555;
}

/* ── 链接 ── */
a { color: #3eaf7c; text-decoration: none; }

/* ── 表格 ── */
table { border-collapse: collapse; margin: 0.8em 0; width: 100%; font-size: 0.95em; }
th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
th { background: #f0f7f3; color: #1a1a2e; font-weight: 600; }
tr:nth-child(even) { background: #fafafa; }

/* ── 代码 ── */
code {
  font-family: 'Cascadia Mono', 'Consolas', 'Courier New', monospace;
  font-size: 0.9em;
  background: #f0f0f0;
  padding: 2px 6px;
  border-radius: 3px;
  color: #d63384;
}
pre {
  font-family: 'Cascadia Mono', 'Consolas', 'Courier New', monospace;
  font-size: 0.88em;
  background: #f5f5f5;
  border-radius: 6px;
  padding: 12px 16px;
  overflow-x: auto;
  line-height: 1.5;
}
pre code {
  background: none;
  padding: 0;
  color: inherit;
  font-size: inherit;
}

/* ── 水平线 ── */
hr { border: none; border-top: 1px solid #e0e0e0; margin: 1.2em 0; }

/* ── 图片 ── */
img { max-width: 100%; border-radius: 4px; }

/* ── 数学公式 ── */
.katex { font-size: 1.05em; }
.katex-display { margin: 0.8em 0; overflow-x: auto; overflow-y: hidden; }
.katex-error { color: #e74c3c; font-size: 0.9em; }
</style>
</head>
<body>
{{ content | safe }}
</body>
</html>
