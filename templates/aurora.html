<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
{{ katex_css | safe }}

/* ── 溢出控制（WeasyPrint 不认 overflow-x，靠断词兜底）── */
body {
  overflow-wrap: break-word;
  word-break: break-word;
}
pre, code, .katex-display, table {
  overflow-wrap: break-word;
  word-break: break-word;
}
td, th {
  word-break: break-all;
}
table {
  table-layout: fixed;
}

@font-face {
  font-family: 'ZhCN';
  src: url('{{ font_url }}') format('truetype');
}

* { box-sizing: border-box; } html { overflow: hidden; }
body {
  font-family: 'ZhCN', 'Segoe UI', sans-serif;
  background: linear-gradient(180deg, #06131d 0%, #0b1f2d 55%, #111827 100%);
  color: #d8e5ef;
  margin: 0;
  padding: 26px;
  width: {{ width }}px;
}

.panel {
  border-radius: 8px;
  overflow: hidden;
  background:
    radial-gradient(circle at 15% 0%, rgba(34, 211, 238, 0.18), transparent 26%),
    radial-gradient(circle at 85% 0%, rgba(16, 185, 129, 0.18), transparent 24%),
    #0f172a;
  border: 1px solid rgba(94, 234, 212, 0.14);
}

.topbar {
  padding: 20px 24px;
  border-bottom: 1px solid rgba(94, 234, 212, 0.14);
}

.title {
  font-size: 13px;
  color: #5eead4;
  margin-bottom: 12px;
}

.stats {
  display: table;
  width: 100%;
  border-collapse: separate;
  border-spacing: 12px 0;
  margin: 0 -12px;
}

.stat {
  display: table-cell;
  padding: 12px 14px;
  background: rgba(15, 23, 42, 0.76);
  border: 1px solid rgba(45, 212, 191, 0.16);
  border-radius: 8px;
}

.stat-name {
  font-size: 11px;
  color: #67e8f9;
  margin-bottom: 5px;
}

.stat-value {
  font-size: 14px;
  color: #f0fdfa;
  word-break: break-word;
}

.body {
  padding: 24px;
}

h1 { font-size: 1.65em; color: #f0fdfa; margin: 0 0 0.8em; }
h2 { font-size: 1.28em; color: #ccfbf1; margin: 1em 0 0.45em; }
h3, h4 { color: #ccfbf1; }
p { margin: 0.65em 0; }
ul, ol { margin: 0.4em 0; padding-left: 1.7em; }
blockquote {
  margin: 0.85em 0;
  padding: 10px 14px;
  border-left: 4px solid #2dd4bf;
  background: rgba(45, 212, 191, 0.08);
}
table { width: 100%; border-collapse: collapse; margin: 0.9em 0; }
th, td { padding: 8px 10px; border: 1px solid rgba(148, 163, 184, 0.2); }
th { background: rgba(45, 212, 191, 0.12); color: #f0fdfa; }
tr:nth-child(even) { background: rgba(255, 255, 255, 0.02); }
code {
  font-family: 'Cascadia Mono', 'Consolas', monospace;
  background: rgba(8, 47, 73, 0.8);
  color: #a5f3fc;
  padding: 2px 6px;
  border-radius: 4px;
}
pre {
  background: #07131f;
  border-radius: 8px;
  padding: 14px 16px;
  border: 1px solid rgba(45, 212, 191, 0.12);
  overflow-x: auto;
}
pre code { background: none; padding: 0; color: inherit; }
a { color: #67e8f9; text-decoration: none; }
hr { border: none; border-top: 1px solid rgba(148, 163, 184, 0.18); margin: 1.3em 0; }
img { max-width: 100%; border-radius: 6px; }
.katex { font-size: 1.05em; }
.katex-display { overflow-x: auto; overflow-y: hidden; margin: 0.85em 0; }
</style>
</head>
<body>
  <div class="panel">
    {% if show_meta %}
    <div class="topbar">
      <div class="title">运行信息</div>
      <div class="stats">
        <div class="stat">
          <div class="stat-name">时间</div>
          <div class="stat-value">{{ render_time }}</div>
        </div>
        <div class="stat">
          <div class="stat-name">模型</div>
          <div class="stat-value">{{ model_name or '未提供' }}</div>
        </div>
        <div class="stat">
          <div class="stat-name">Tokens</div>
          <div class="stat-value">{{ total_tokens if total_tokens is not none else '-' }} / {{ prompt_tokens if prompt_tokens is not none else '-' }} / {{ completion_tokens if completion_tokens is not none else '-' }}</div>
        </div>
      </div>
    </div>
    {% endif %}
    <div class="body">{{ content | safe }}</div>
  </div>
</body>
</html>
